<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowura AI | By Uday Singh</title>
    <link rel="icon" type="image/png" href="Know (1).png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --dark: #0a0f1e; 
            --mid-teal: #1C8585;
            --bright-teal: #1DA27E; 
            --glass: rgba(10, 15, 30, 0.85);
            --glass-border: rgba(29, 162, 126, 0.4); 
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        body {
            height: 100vh;
            background: url('f63d0bcba1ab007ce529c7496639acb9.jpg') no-repeat center center fixed;
            background-size: cover; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text); overflow: hidden;
        }

        /* Startup Screen */
        #startup {
            position: fixed; inset: 0; z-index: 100; 
            background: rgba(0, 5, 15, 0.9);
            backdrop-filter: blur(30px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.8s ease;
        }

        .glass-card {
            background: var(--glass); 
            backdrop-filter: blur(40px); 
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 40px; text-align: center; width: 90%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .main-logo { width: 200px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--bright-teal)); }

        /* App Layout */
        #app { display: none; width: 100%; height: 100vh; flex-direction: column; padding: 20px; max-width: 1200px; opacity: 0; transition: 0.5s; }
        
        .chat-container {
            flex: 1; background: var(--glass); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 15px 25px; background: rgba(0,0,0,0.4); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); 
        }

        .header-logo { height: 32px; width: auto; }

        /* Music Button */
        #musicBtn {
            background: transparent; border: 1px solid var(--bright-teal);
            color: var(--bright-teal); padding: 6px 15px; border-radius: 50px;
            cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        #musicBtn.on { background: var(--bright-teal); color: white; }

        /* Chat Area */
        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; scrollbar-color: var(--bright-teal) transparent; }
        
        .msg { padding: 15px 20px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.6; animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai { background: rgba(255,255,255,0.07); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .user { background: var(--mid-teal); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .msg b { color: var(--bright-teal); }
        .msg ol, .msg ul { padding-left: 25px; margin: 10px 0; }
        pre { background: #070b14; color: #78e2c8; padding: 15px; border-radius: 12px; margin: 10px 0; overflow-x: auto; font-family: 'Consolas', monospace; border: 1px solid var(--mid-teal); }

        /* Input Bar */
        .input-area { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border); }
        input#userInput { flex: 1; padding: 14px 20px; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px; }
        
        #sendBtn { background: var(--bright-teal); color: white; border: none; padding: 0 25px; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        #sendBtn:hover { transform: scale(1.03); box-shadow: 0 0 15px var(--bright-teal); }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="startup">
        <div class="glass-card">
            <img src="Know (1).png" class="main-logo" alt="Knowura Logo">
            <p style="margin-bottom: 25px; color: #ccc;">Designed by <b>Uday Singh</b></p>
            <div id="g_id_onload" data-client_id="881574590484-beet5os15tc4f3pba7e2lft7u6ufsbrr.apps.googleusercontent.com" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <button style="width:100%; padding:14px; margin-top:15px; border-radius:50px; border:1px solid var(--mid-teal); background:transparent; color:white; font-weight:700; cursor:pointer;" onclick="enterApp('Guest')">Continue as Guest</button>
        </div>
    </div>

    <div id="app">
        <div class="chat-container">
            <header>
                <img src="Know (1).png" class="header-logo">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button id="musicBtn" onclick="toggleMusic()">🎵 Music: OFF</button>
                    <div id="user-display" style="font-weight: 600; font-size: 14px; color: var(--bright-teal);"></div>
                </div>
            </header>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask Knowura something..." autocomplete="off">
                <button id="sendBtn" onclick="ask()">SEND</button>
            </div>
        </div>
    </div>

<script>
    let currentUser = "Learner";
    let musicPlaying = false;

    function toggleMusic() {
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        if (!musicPlaying) {
            music.play();
            btn.innerText = "🎵 Music: ON";
            btn.classList.add('on');
        } else {
            music.pause();
            btn.innerText = "🎵 Music: OFF";
            btn.classList.remove('on');
        }
        musicPlaying = !musicPlaying;
    }

    function onSignIn(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload.given_name;
        document.getElementById('user-display').innerText = currentUser;
        enterApp();
    }

    function enterApp(mode) {
        if(mode === 'Guest') {
            currentUser = "Guest";
            document.getElementById('user-display').innerText = "Guest";
        }
        document.getElementById('startup').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('startup').style.display = 'none'; 
            const app = document.getElementById('app');
            app.style.display = 'flex';
            setTimeout(() => app.style.opacity = '1', 50);
            loadHistory(); 
        }, 800);
    }

    function formatAIResponse(text) {
        text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        const lines = text.split('\n');
        let html = '';
        let inList = false;
        lines.forEach(line => {
            const listMatch = line.match(/^\d+\.\s(.*)/);
            if (listMatch) {
                if (!inList) { html += '<ol>'; inList = true; }
                html += `<li>${listMatch[1]}</li>`;
            } else {
                if (inList) { html += '</ol>'; inList = false; }
                if (line.trim()) html += `<p>${line}</p>`;
            }
        });
        if (inList) html += '</ol>';
        return html;
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user', true);
        input.value = '';
        const thinking = addBubble("Thinking...", 'ai', false);

        try {
            const res = await fetch("/.netlify/functions/ask-ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: text, user: currentUser })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            const formatted = formatAIResponse(reply);
            
            thinking.innerHTML = formatted;
            saveMsg(formatted, 'ai');
        } catch (e) {
            thinking.innerText = "Knowura's connection was interrupted. Check your Netlify logs.";
        }
    }

    function addBubble(t, c, save) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerHTML = t;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        if (save) saveMsg(t, c);
        return div;
    }

    function saveMsg(text, type) {
        let history = JSON.parse(localStorage.getItem('knowura_vfinal')) || [];
        history.push({ text, type });
        localStorage.setItem('knowura_vfinal', JSON.stringify(history.slice(-15)));
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('knowura_vfinal')) || [];
        if (history.length === 0) {
            addBubble(`Hello <b>${currentUser}</b>! I am Knowura, created by <b>Uday Singh</b>. How can I help you study?`, 'ai', false);
        } else {
            history.forEach(m => addBubble(m.text, m.type, false));
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') ask(); });
</script>
</body>
</html>
