<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowura AI | By Uday Singh</title>
    <link rel="icon" type="image/png" href="Know (1).png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --dark: #0a0f1e; 
            --mid-teal: #1C8585;
            --bright-teal: #1DA27E; 
            --glass: rgba(10, 15, 30, 0.85);
            --glass-border: rgba(29, 162, 126, 0.4); 
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            height: 100vh;
            background: url('f63d0bcba1ab007ce529c7496639acb9.jpg') no-repeat center center fixed;
            background-size: cover; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text); overflow: hidden;
        }

        /* Startup */
        #startup {
            position: fixed; inset: 0; z-index: 100; 
            background: rgba(0, 5, 15, 0.9);
            backdrop-filter: blur(30px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.8s;
        }

        .glass-card {
            background: var(--glass); 
            backdrop-filter: blur(40px); 
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 40px; text-align: center; width: 90%; max-width: 420px;
        }

        .main-logo { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--bright-teal)); }

        /* App */
        #app { display: none; width: 100%; height: 100vh; flex-direction: column; padding: 20px; max-width: 1100px; opacity: 0; transition: 0.5s; }
        
        .chat-container {
            flex: 1; background: var(--glass); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 15px 25px; background: rgba(0,0,0,0.4); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); 
        }

        .header-logo { height: 30px; }

        .controls { display: flex; gap: 10px; align-items: center; }

        .btn-ui {
            background: transparent; border: 1px solid var(--bright-teal);
            color: var(--bright-teal); padding: 6px 12px; border-radius: 50px;
            cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s;
        }
        .btn-ui:hover { background: rgba(29, 162, 126, 0.2); }
        .btn-ui.active { background: var(--bright-teal); color: white; }

        /* Chat */
        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 20px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.6; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .user { background: var(--mid-teal); align-self: flex-end; border-bottom-right-radius: 4px; }

        pre { background: #070b14; color: #78e2c8; padding: 15px; border-radius: 12px; margin: 10px 0; overflow-x: auto; font-family: monospace; border: 1px solid var(--mid-teal); }

        .input-area { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border); }
        input#userInput { flex: 1; padding: 14px 20px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        #sendBtn { background: var(--bright-teal); color: white; border: none; padding: 0 25px; border-radius: 14px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto"></audio>

    <div id="startup">
        <div class="glass-card">
            <img src="Know (1).png" class="main-logo">
            <p style="margin-bottom: 20px; color: #aaa;">Created by <b>Uday Singh</b> (2013)</p>
            <div id="g_id_onload" data-client_id="881574590484-beet5os15tc4f3pba7e2lft7u6ufsbrr.apps.googleusercontent.com" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <button class="btn-ui" style="width:100%; margin-top:15px; padding:12px;" onclick="enterApp('Guest')">Continue as Guest</button>
        </div>
    </div>

    <div id="app">
        <div class="chat-container">
            <header>
                <img src="Know (1).png" class="header-logo">
                <div class="controls">
                    <button id="musicBtn" class="btn-ui" onclick="toggleMusic()">🎵 Music: OFF</button>
                    <select id="trackSelect" class="btn-ui" onchange="changeTrack()" style="background: var(--dark);">
                        <option value="Lukrembo - Sunflower (freetouse.com).mp3">🌻 Sunflower</option>
                        <option value="Lukrembo - Bean (freetouse.com).mp3">🫘 Bean</option>
                    </select>
                    <div id="user-display" style="font-size: 13px; color: var(--bright-teal); font-weight: bold;"></div>
                </div>
            </header>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask Knowura..." autocomplete="off">
                <button id="sendBtn" onclick="ask()">SEND</button>
            </div>
        </div>
    </div>

<script>
    let currentUser = "Learner";
    const music = document.getElementById('bgMusic');
    const trackSelect = document.getElementById('trackSelect');

    function onSignIn(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload.given_name;
        document.getElementById('user-display').innerText = currentUser;
        enterApp();
    }

    function enterApp(mode) {
        if(mode === 'Guest') {
            currentUser = "Guest";
            document.getElementById('user-display').innerText = "Guest";
        }
        // Set initial track
        music.src = trackSelect.value;
        
        document.getElementById('startup').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('startup').style.display = 'none'; 
            const app = document.getElementById('app');
            app.style.display = 'flex';
            setTimeout(() => app.style.opacity = '1', 50);
            loadHistory(); 
        }, 800);
    }

    function toggleMusic() {
        const btn = document.getElementById('musicBtn');
        if (music.paused) {
            music.play().then(() => {
                btn.innerText = "🎵 Music: ON";
                btn.classList.add('active');
            }).catch(() => alert("Please click anywhere on the page first!"));
        } else {
            music.pause();
            btn.innerText = "🎵 Music: OFF";
            btn.classList.remove('active');
        }
    }

    function changeTrack() {
        const wasPlaying = !music.paused;
        music.src = trackSelect.value;
        if (wasPlaying) music.play();
    }

    function formatAIResponse(text) {
        text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        return text.split('\n').map(line => line.trim() ? `<p>${line}</p>` : '').join('');
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user', true);
        input.value = '';
        const thinking = addBubble("Thinking...", 'ai', false);

        try {
            const res = await fetch("/.netlify/functions/ask-ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: text, user: currentUser })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            thinking.innerHTML = formatAIResponse(reply);
            saveMsg(thinking.innerHTML, 'ai');
        } catch (e) {
            thinking.innerText = "Connection lost. Ensure Netlify Functions are active.";
        }
    }

    function addBubble(t, c, save) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerHTML = t;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        if (save) saveMsg(t, c);
        return div;
    }

    function saveMsg(text, type) {
        let history = JSON.parse(localStorage.getItem('knowura_vfinal')) || [];
        history.push({ text, type });
        localStorage.setItem('knowura_vfinal', JSON.stringify(history.slice(-15)));
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('knowura_vfinal')) || [];
        if (history.length === 0) {
            addBubble(`Welcome <b>${currentUser}</b>. I am Knowura, created by <b>Uday Singh</b>. Ready to study?`, 'ai', false);
        } else {
            history.forEach(m => addBubble(m.text, m.type, false));
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') ask(); });
</script>
</body>
</html>
