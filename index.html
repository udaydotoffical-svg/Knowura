<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowura AI</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --dark: #15292E; --deep-teal: #074047; --mid-teal: #1C8585;
            --bright-teal: #1DA27E; --glass: rgba(21, 41, 46, 0.88);
            --glass-border: rgba(29, 162, 126, 0.3); --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            height: 100vh;
            background: url('https://raw.githubusercontent.com/udaydotoffical-svg/Knowura/main/4K%20High%20Resolution%20Dark%20Geometric%20Shards%20Wallpaper%20for%20Windows%2011.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; align-items: center; justify-content: center; color: var(--text); overflow: hidden;
        }

        /* STARTUP PAGE */
        #startup {
            position: fixed; inset: 0; z-index: 100; background: rgba(7, 64, 71, 0.95);
            backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease;
        }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 40px; text-align: center; width: 90%; max-width: 450px;
        }

        /* APP UI */
        #app { display: none; width: 100%; height: 100vh; flex-direction: column; padding: 10px; }
        .chat-container {
            flex: 1; background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); border-radius: 25px; display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 12px 20px; background: rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; 
            justify-content: space-between; align-items: center; gap: 10px;
        }

        /* CONTROLS AREA */
        .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .music-nav { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.08); padding: 5px 12px; border-radius: 50px; }
        button.small-btn { background: none; border: none; color: var(--bright-teal); cursor: pointer; font-size: 18px; }
        input[type="range"] { accent-color: var(--bright-teal); width: 60px; height: 4px; cursor: pointer; }

        /* CHAT BOX */
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 20px; border-radius: 22px; max-width: 85%; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .ai { background: rgba(255,255,255,0.06); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }
        .user { background: var(--mid-teal); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* FORMATTING SUPPORT */
        .msg b { color: var(--bright-teal); font-weight: 700; }
        .msg i { opacity: 0.9; font-style: italic; }
        pre { background: #0a1112; color: #78e2c8; padding: 15px; border-radius: 12px; margin: 10px 0; overflow-x: auto; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid var(--deep-teal); }

        /* INPUT AREA */
        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); }
        input#userInput { flex: 1; padding: 14px 22px; border-radius: 50px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px; }
        #sendBtn { background: var(--bright-teal); color: white; border: none; padding: 0 25px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        #sendBtn:active { transform: scale(0.95); }

        @media (max-width: 600px) {
            header { justify-content: center; }
            .msg { max-width: 90%; font-size: 14px; }
            .controls { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source id="music-source" src="Lukrembo - Sunflower (freetouse.com).mp3" type="audio/mpeg">
    </audio>

    <div id="startup">
        <div class="glass-card">
            <h1 style="color: var(--bright-teal); font-size: 3rem; letter-spacing: -3px; margin-bottom: 5px;">KNOWURA</h1>
            <p style="color: #a1b8bc; margin-bottom: 35px; font-size: 0.9rem;">The Intelligent Study Partner</p>
            <div id="g_id_onload" data-client_id="881574590484-beet5os15tc4f3pba7e2lft7u6ufsbrr.apps.googleusercontent.com" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
            <button style="width:100%; padding:15px; margin-top:20px; border-radius:50px; border:1px solid var(--mid-teal); background:transparent; color:white; font-weight:700; cursor:pointer;" onclick="enterApp('Guest')">Continue as Guest</button>
        </div>
    </div>

    <div id="app">
        <div class="chat-container">
            <header>
                <div style="font-weight: 900; color: var(--bright-teal); font-size: 1.2rem;">KNOWURA</div>
                <div class="controls">
                    <div class="music-nav">
                        <button class="small-btn" onclick="switchTrack()">⏮️</button>
                        <input type="range" min="0" max="1" step="0.1" value="0.2" oninput="updateVol(this.value)">
                        <button class="small-btn" onclick="switchTrack()">⏭️</button>
                    </div>
                    <div id="user-info"></div>
                </div>
            </header>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask Knowura something...">
                <button id="sendBtn" onclick="ask()">SEND</button>
            </div>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let currentUser = "Learner";
    const audio = document.getElementById('bg-music');
    const tracks = ["Lukrembo - Sunflower (freetouse.com).mp3", "Lukrembo - Bean (freetouse.com).mp3"];
    let currentTrackIdx = 0;

    function updateVol(v) { audio.volume = v; }

    function switchTrack() {
        currentTrackIdx = (currentTrackIdx + 1) % tracks.length;
        document.getElementById('music-source').src = tracks[currentTrackIdx];
        audio.load();
        audio.play();
    }

    function onSignIn(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload.given_name;
        document.getElementById('user-info').innerHTML = `<img src="${payload.picture}" style="width:28px; border-radius:50%; border:1px solid var(--bright-teal);">`;
        enterApp();
    }

    function enterApp(mode) {
        if(mode === 'Guest') currentUser = "Guest";
        audio.play().catch(() => {});
        document.getElementById('startup').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('startup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadHistory();
        }, 800);
    }

    // --- AI FORMATTING & HISTORY ---
    function formatAIResponse(text) {
        // Bold: **text** -> <b>text</b>
        text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        // Italic: *text* -> <i>text</i>
        text = text.replace(/\*(.*?)\*/g, '<i>$1</i>');
        // Code blocks: ```code``` -> <pre>code</pre>
        text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        return text;
    }

    function saveMsg(text, type) {
        let history = JSON.parse(localStorage.getItem('knowura_v3')) || [];
        history.push({ text, type });
        localStorage.setItem('knowura_v3', JSON.stringify(history));
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('knowura_v3')) || [];
        if (history.length === 0) addBubble("Hello! I am <b>Knowura</b>. How can I help you today?", 'ai', false);
        else history.forEach(m => addBubble(m.text, m.type, false));
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user', true);
        input.value = '';
        const thinking = addBubble("Thinking...", 'ai', false);

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: `You are Knowura. You can use **bold** and *italics*. Format code in triple backticks.` }, { role: "user", content: text }]
                })
            });
            const data = await res.json();
            const rawText = data.choices[0].message.content;
            const formatted = formatAIResponse(rawText);
            thinking.innerHTML = formatted;
            saveMsg(formatted, 'ai');
        } catch (e) { thinking.innerText = "Error connecting."; }
    }

    function addBubble(t, c, save) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerHTML = (c === 'ai') ? t : t; // Formatting already applied for AI
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        if (save) saveMsg(t, c);
        return div;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') ask(); });
</script>
</body>
</html>
