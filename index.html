<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowura AI | By Uday Singh</title>
    <link rel="icon" type="image/png" href="Know (1).png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <style>
        :root {
            --dark: #0a0f1e; 
            --mid-teal: #1C8585;
            --bright-teal: #1DA27E; 
            --glass: rgba(10, 15, 30, 0.85);
            --glass-border: rgba(29, 162, 126, 0.4); 
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            background: url('f63d0bcba1ab007ce529c7496639acb9.jpg') no-repeat center center fixed;
            background-size: cover; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text); overflow: hidden;
        }

        #startup {
            position: fixed; inset: 0; z-index: 100; 
            background: rgba(0, 5, 15, 0.95);
            backdrop-filter: blur(30px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.8s;
        }

        .glass-card {
            background: var(--glass); 
            backdrop-filter: blur(40px); 
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 40px; text-align: center; width: 90%; max-width: 400px;
        }

        .main-logo { width: 160px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--bright-teal)); }

        #app { display: none; width: 100%; height: 100vh; flex-direction: column; padding: 20px; max-width: 1100px; opacity: 0; transition: 0.5s; }
        
        .chat-container {
            flex: 1; background: var(--glass); backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 15px 25px; background: rgba(0,0,0,0.5); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); 
            transition: 0.3s;
        }

        header.owner-mode {
            background: rgba(60, 10, 20, 0.6);
            border-bottom: 1px solid #e94560;
        }

        .header-logo { height: 28px; }
        .controls { display: flex; gap: 10px; align-items: center; }

        .btn-ui {
            background: transparent; border: 1px solid var(--bright-teal);
            color: var(--bright-teal); padding: 6px 14px; border-radius: 50px;
            cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s;
        }
        .btn-ui.active { background: var(--bright-teal); color: white; }
        .btn-ui:disabled { opacity: 0.5; cursor: not-allowed; }

        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 20px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.6; animation: fadeInUp 0.3s ease; word-wrap: break-word; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        
        .msg pre { 
            background: #0d1117; 
            padding: 12px; 
            border-radius: 8px; 
            overflow-x: auto; 
            margin: 8px 0;
            border: 1px solid #30363d;
        }
        
        .msg code { 
            font-family: 'Courier New', monospace; 
            font-size: 13px; 
            color: #58d68d;
            display: block;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .msg p code {
            background: #0d1117;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline;
            color: #58d68d;
        }
        
        .user { background: var(--mid-teal); align-self: flex-end; border-bottom-right-radius: 4px; }

        .memory-badge {
            font-size: 10px; color: var(--bright-teal); opacity: 0.7;
            padding: 2px 8px; border: 1px solid var(--glass-border);
            border-radius: 20px; margin-left: 8px;
        }

        .input-area { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border); }
        input#userInput { flex: 1; padding: 14px 20px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        #sendBtn { background: var(--bright-teal); color: white; border: none; padding: 0 25px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        select#trackSelect { background: #0a0f1e; color: var(--bright-teal); border: 1px solid var(--bright-teal); border-radius: 50px; padding: 5px; font-size: 11px; outline: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto"></audio>

    <div id="startup">
        <div class="glass-card">
            <img src="Know (1).png" class="main-logo">
            <p style="margin-bottom: 25px; color: #aaa;"><b>Knowura AI</b><br>Engineered by Uday Singh</p>
            <div id="g_id_onload" data-client_id="881574590484-beet5os15tc4f3pba7e2lft7u6ufsbrr.apps.googleusercontent.com" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <button class="btn-ui" style="width:100%; margin-top:15px; padding:12px;" onclick="enterApp('Guest')">Continue as Guest</button>
        </div>
    </div>

    <div id="app">
        <div class="chat-container">
            <header>
                <div style="display:flex; align-items:center;">
                    <img src="Know (1).png" class="header-logo">
                    <span id="memory-badge" class="memory-badge" style="display:none;">🧠 Memory ON</span>
                    <span id="owner-badge" class="memory-badge" style="display:none; border-color:#e94560; color:#e94560;">🔓 Owner Mode</span>
                </div>
                <div class="controls">
                    <button id="musicBtn" class="btn-ui" onclick="toggleMusic()">🎵 Music: OFF</button>
                    <select id="trackSelect" onchange="changeTrack()">
                        <option value="Lukrembo - Sunflower (freetouse.com).mp3">🌻 Sunflower</option>
                        <option value="Lukrembo - Bean (freetouse.com).mp3">🫘 Bean</option>
                        <option value="Lukrembo - Flower Cup (freetouse.com).mp3">🌸 Flower Cup</option>
                        <option value="Lukrembo - Apple Tree (freetouse.com).mp3">🍎 Apple Tree</option>
                        <option value="Lukrembo - Spaceship (freetouse.com).mp3">🚀 Spaceship</option>
                    </select>
                    <button class="btn-ui" onclick="clearMemory()" title="Clear all memory">🗑 Memory</button>
                    <button id="ownerBtn" class="btn-ui" onclick="unlockOwnerMode()" title="Unlock owner mode with your security key">🔑 Unlock Owner</button>
                    <div id="user-display" style="font-size: 13px; color: var(--bright-teal); font-weight: bold; margin-left: 10px;"></div>
                </div>
            </header>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendBtn" onclick="ask()">SEND</button>
            </div>
        </div>
    </div>

<script>
    let currentUser = "Learner";
    // conversationMessages holds the raw text history sent to groq (last 10)
    let conversationMessages = [];
    // Owner mode is in-memory only — never persisted, resets on refresh
    let ownerMode = false;
    const music = document.getElementById('bgMusic');
    const trackSelect = document.getElementById('trackSelect');

    // ─── OWNER MODE (FIDO2 / WebAuthn) ───────────────────────────────────────

    async function unlockOwnerMode() {
        const btn = document.getElementById('ownerBtn');
        btn.disabled = true;
        const originalText = btn.innerText;
        btn.innerText = "Tap your key...";

        try {
            const optionsRes = await fetch('/.netlify/functions/webauthn-login-options');
            if (!optionsRes.ok) {
                alert("No security key registered yet.");
                return;
            }
            const options = await optionsRes.json();

            const authResp = await SimpleWebAuthnBrowser.startAuthentication({ optionsJSON: options });

            const verifyRes = await fetch('/.netlify/functions/webauthn-login-verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(authResp)
            });
            const result = await verifyRes.json();

            if (result.verified) {
                ownerMode = true;
                document.getElementById('owner-badge').style.display = 'inline-block';
                document.querySelector('header').classList.add('owner-mode');
                btn.style.display = 'none';
            } else {
                alert("Verification failed.");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        } catch (e) {
            console.warn("Owner unlock cancelled or failed:", e);
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    // ─── MEMORY HELPERS ──────────────────────────────────────────────────────

    function getMemory() {
        return {
            summary: localStorage.getItem('knowura_summary') || '',
            facts: JSON.parse(localStorage.getItem('knowura_facts') || '[]')
        };
    }

    function updateBadge() {
        const mem = getMemory();
        const badge = document.getElementById('memory-badge');
        const hasMemory = mem.summary || mem.facts.length > 0;
        badge.style.display = hasMemory ? 'inline-block' : 'none';
        badge.title = hasMemory
            ? `Facts: ${mem.facts.join(', ') || 'none'}\n\nSummary: ${mem.summary || 'none'}`
            : '';
    }

    function clearMemory() {
        if (!confirm('Clear all Knowura memory? (facts + summary)')) return;
        localStorage.removeItem('knowura_summary');
        localStorage.removeItem('knowura_facts');
        localStorage.removeItem('knowura_chat');
        localStorage.removeItem('knowura_msg_count');
        conversationMessages = [];
        updateBadge();
        document.getElementById('chat-box').innerHTML = '';
        addBubble(`Memory cleared. Fresh start, <b>${currentUser}</b>!`, 'ai', false);
    }

    // ─── ENTITY EXTRACTION (runs after every AI reply) ────────────────────────

    async function extractFacts(userMsg, aiReply) {
        const existing = JSON.parse(localStorage.getItem('knowura_facts') || '[]');

        try {
            const res = await fetch("/.netlify/functions/ask-ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    memory: {},
                    messages: [
                        {
                            role: "user",
                            content: `Extract factual entities about the USER ONLY from this exchange. Focus on: name, subjects they're studying, grade/age, interests, goals, learning style, stru[...]

User said: "${userMsg}"
AI replied: "${aiReply.substring(0, 300)}"

Already known facts: ${existing.join(', ') || 'none'}

Return ONLY a JSON array of short fact strings like ["User studies biology", "User is in grade 10"]. If no new facts found, return []. No markdown, no explanation, raw JSON only.`
                        }
                    ]
                })
            });

            const data = await res.json();
            const raw = data?.choices?.[0]?.message?.content?.trim() || '[]';
            const newFacts = JSON.parse(raw.replace(/```json|```/g, '').trim());

            if (Array.isArray(newFacts) && newFacts.length > 0) {
                // Merge, deduplicate, cap at 20 facts
                const merged = [...new Set([...existing, ...newFacts])].slice(-20);
                localStorage.setItem('knowura_facts', JSON.stringify(merged));
                updateBadge();
            }
        } catch (e) {
            console.warn('Entity extraction failed silently:', e);
        }
    }

    // ─── SUMMARIZATION (runs every 10 messages) ───────────────────────────────

    async function maybeSummarize() {
        let count = parseInt(localStorage.getItem('knowura_msg_count') || '0') + 1;
        localStorage.setItem('knowura_msg_count', count);

        if (count % 10 !== 0) return;

        const history = JSON.parse(localStorage.getItem('knowura_chat') || '[]');
        const recentText = history.slice(-10).map(m => `${m.type === 'user' ? 'User' : 'Knowura'}: ${m.text.replace(/<[^>]+>/g, '')}`).join('\n');

        try {
            const res = await fetch("/.netlify/functions/ask-ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    memory: {},
                    messages: [
                        {
                            role: "user",
                            content: `Summarize this conversation in 3-4 sentences. Focus on topics discussed, what the user learned, and any ongoing questions. Be concise.\n\n${recentText}\n\nRe[...]`
                        }
                    ]
                })
            });

            const data = await res.json();
            const summary = data?.choices?.[0]?.message?.content?.trim();
            if (summary) {
                localStorage.setItem('knowura_summary', summary);
                updateBadge();
                console.log('📝 Knowura memory updated');
            }
        } catch (e) {
            console.warn('Summarization failed silently:', e);
        }
    }

    // ─── MAIN ASK FUNCTION ────────────────────────────────────────────────────

    function looksSearchWorthy(text) {
        const explicitTriggers = ["search for", "search the web", "look up", "google", "find information on", "can you search"];
        const contextTriggers = [
            "latest", "current", "today", "recent", "news", "who is", "what is the price",
            "when did", "how much does", "right now", "this year", "2025", "2026", "score", "weather"
        ];
        const lower = text.toLowerCase();
        return explicitTriggers.some(t => lower.includes(t)) || contextTriggers.some(t => lower.includes(t));
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user', true);
        input.value = '';

        // Add to rolling conversation window (last 10 for groq context)
        conversationMessages.push({ role: "user", content: text });
        if (conversationMessages.length > 10) conversationMessages.shift();

        const willSearch = looksSearchWorthy(text);
        const thinking = addBubble(willSearch ? "🔍 Searching the web..." : "Thinking...", 'ai', false);
        let searchStageTimer = null;
        if (willSearch) {
            searchStageTimer = setTimeout(() => {
                thinking.innerText = "Thinking...";
            }, 1200);
        }

        try {
            const res = await fetch("/.netlify/functions/ask-ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: conversationMessages,
                    memory: getMemory(),
                    ownerMode: ownerMode
                })
            });

            if (!res.ok) throw new Error("Network issue");

            const data = await res.json();

            if (searchStageTimer) clearTimeout(searchStageTimer);

            if (data?.choices?.[0]) {
                const reply = data.choices[0].message.content;
                thinking.innerHTML = marked.parse(reply);
                saveMsg(thinking.innerHTML, 'ai');

                // Add AI reply to conversation window
                conversationMessages.push({ role: "assistant", content: reply });
                if (conversationMessages.length > 10) conversationMessages.shift();

                // Run memory updates in background (non-blocking)
                extractFacts(text, reply);
                maybeSummarize();
            } else {
                throw new Error("Empty response");
            }

        } catch (e) {
            console.error(e);
            thinking.innerText = "Connection lost. Ensure your Netlify Secret Key is set.";
        }
    }

    // ─── UI HELPERS ───────────────────────────────────────────────────────

    function addBubble(t, c, save) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerHTML = t;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        if (save) saveMsg(t, c);
        return div;
    }

    function saveMsg(text, type) {
        let history = JSON.parse(localStorage.getItem('knowura_chat') || '[]');
        history.push({ text, type });
        localStorage.setItem('knowura_chat', JSON.stringify(history.slice(-30)));
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('knowura_chat') || '[]');
        if (history.length === 0) {
            addBubble(`Hello <b>${currentUser}</b>. I am Knowura, developed by <b>Uday Singh</b>. How can I help you today?`, 'ai', false);
        } else {
            history.forEach(m => addBubble(m.text, m.type, false));
            // Rebuild conversationMessages from last 10 saved (plain text only)
            history.slice(-10).forEach(m => {
                conversationMessages.push({
                    role: m.type === 'user' ? 'user' : 'assistant',
                    content: m.text.replace(/<[^>]+>/g, '')
                });
            });
        }
        updateBadge();
    }

    // ─── AUTH & MUSIC ───────────────────────────────────────────────────────

    function onSignIn(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload.given_name;
        document.getElementById('user-display').innerText = currentUser;
        enterApp();
    }

    function enterApp(mode) {
        if (mode === 'Guest') {
            currentUser = "Guest";
            document.getElementById('user-display').innerText = "Guest";
        }
        music.src = trackSelect.value;
        document.getElementById('startup').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('startup').style.display = 'none'; 
            const app = document.getElementById('app');
            app.style.display = 'flex';
            setTimeout(() => app.style.opacity = '1', 50);
            loadHistory(); 
        }, 800);
    }

    function toggleMusic() {
        const btn = document.getElementById('musicBtn');
        if (music.paused) {
            music.play().then(() => {
                btn.innerText = "🎵 Music: ON";
                btn.classList.add('active');
            }).catch(() => alert("Click the screen first to enable audio!"));
        } else {
            music.pause();
            btn.innerText = "🎵 Music: OFF";
            btn.classList.remove('active');
        }
    }

    function changeTrack() {
        const wasPlaying = !music.paused;
        music.src = trackSelect.value;
        if (wasPlaying) music.play();
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') ask(); });
</script>
</body>
</html>
